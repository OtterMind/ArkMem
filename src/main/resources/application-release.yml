server:
  port: 19028

spring:
  application:
    name: arkmem
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/arkmem?allowMultiQueries=true
    username: root
    password: 123456
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 1
      connection-timeout: 30000

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
  info:
    env:
      enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

info:
  app:
    name: ArkMem
    version: 0.1.0-SNAPSHOT

arkmem:
  storage:
    provider: postgres
  prompt:
    language: en
  llm:
    provider: aliyun-bailian
    api-key: ${DASHSCOPE_API_KEY:}
    base-url: ${DASHSCOPE_API_URL:}
    model: qwen3-max
    temperature: 0.2
  embedding:
    provider: aliyun-bailian
    api-key: ${DASHSCOPE_API_KEY:}
    base-url: ${DASHSCOPE_API_URL:}
    model: text-embedding-v4
    local-dimensions: 1024
  memory:
    default-top-k: 10
    default-threshold: 0.0
    duplicate-threshold: 0.985
    fallback-extraction-enabled: true
