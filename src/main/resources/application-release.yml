server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: arkmem
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_MAXIMUM_POOL_SIZE:10}
      minimum-idle: ${SPRING_DATASOURCE_MINIMUM_IDLE:1}
      connection-timeout: ${SPRING_DATASOURCE_CONNECTION_TIMEOUT:30000}

arkmem:
  api:
    internal-token: ${ARKMEM_API_INTERNAL_TOKEN:}
  storage:
    provider: ${ARKMEM_STORAGE_PROVIDER:postgres}
  prompt:
    language: ${ARKMEM_PROMPT_LANGUAGE:en}
  llm:
    provider: ${ARKMEM_LLM_PROVIDER:auto}
    api-key: ${ARKMEM_LLM_API_KEY:}
    base-url: ${ARKMEM_LLM_BASE_URL:https://api.openai.com/v1}
    model: ${ARKMEM_LLM_MODEL:gpt-4.1-nano-2025-04-14}
    temperature: ${ARKMEM_LLM_TEMPERATURE:0.2}
    timeout-seconds: ${ARKMEM_LLM_TIMEOUT_SECONDS:30}
  embedding:
    provider: ${ARKMEM_EMBEDDING_PROVIDER:auto}
    api-key: ${ARKMEM_EMBEDDING_API_KEY:}
    base-url: ${ARKMEM_EMBEDDING_BASE_URL:https://api.openai.com/v1}
    model: ${ARKMEM_EMBEDDING_MODEL:text-embedding-3-small}
    local-dimensions: ${ARKMEM_EMBEDDING_LOCAL_DIMENSIONS:384}
    timeout-seconds: ${ARKMEM_EMBEDDING_TIMEOUT_SECONDS:30}
  memory:
    default-top-k: ${ARKMEM_DEFAULT_TOP_K:10}
    default-threshold: ${ARKMEM_DEFAULT_THRESHOLD:0.0}
    duplicate-threshold: ${ARKMEM_DUPLICATE_THRESHOLD:0.985}
    fallback-extraction-enabled: ${ARKMEM_FALLBACK_EXTRACTION_ENABLED:true}
