services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: arkmem-postgres
    environment:
      POSTGRES_DB: arkmem
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - arkmem-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d arkmem"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  arkmem-postgres-data:
